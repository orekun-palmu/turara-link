<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪代つらら</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #eff7fb;
    --bg-panel: #ffffff;
    --bg-panel-2: #f2fafd;
    --blue: #6fb3d9;
    --blue-deep: #2f7096;
    --pink: #f0a9c4;
    --pink-deep: #d97fa0;
    --text: #33475a;
    --text-dim: #849aa9;
    --line: rgba(111,179,217,0.28);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{
    margin:0;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(111,179,217,0.16), transparent 55%),
      radial-gradient(ellipse at 50% 110%, rgba(240,169,196,0.14), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Zen Maru Gothic', sans-serif;
    line-height:1.9;
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- 雪の結晶 ---------- */
  .drift{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .drift-item{
    position:absolute;
    top:-24px;
    font-size:16px;
    opacity:0;
    animation:fall linear infinite;
    filter:drop-shadow(0 0 3px rgba(111,179,217,0.3));
  }
  @keyframes fall{
    0%{transform:translateY(0) translateX(0) rotate(0deg); opacity:0;}
    8%{opacity:.85;}
    92%{opacity:.55;}
    100%{transform:translateY(112vh) translateX(var(--drift,30px)) rotate(300deg); opacity:0;}
  }

  main, header, footer{position:relative; z-index:1;}

  .wrap{max-width:640px; margin:0 auto; padding:0 28px;}

  /* ---------- ヒーロー ---------- */
  header.hero{
    min-height:92vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:60px 28px;
  }

  .crest{
    width:150px; height:150px;
    border-radius:50%;
    overflow:hidden;
    background: var(--bg-panel);
    border:3px solid var(--blue);
    box-shadow:0 0 0 6px rgba(239,247,251,0.9), 0 8px 26px rgba(47,112,150,0.22);
    margin-bottom:30px;
    transform:scale(1.4) rotate(-8deg);
    opacity:0;
    animation:bloomIn .8s cubic-bezier(.2,.9,.3,1.15) .25s forwards;
  }
  .crest img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  @keyframes bloomIn{
    0%{transform:scale(1.4) rotate(-8deg); opacity:0;}
    60%{transform:scale(0.97) rotate(2deg); opacity:1;}
    100%{transform:scale(1) rotate(0deg); opacity:1;}
  }

  h1.name{
    font-family:'Kaisei Decol', serif;
    font-weight:700;
    font-size:clamp(2.3rem, 8vw, 3.4rem);
    letter-spacing:.06em;
    margin:0 0 14px;
    color:var(--blue-deep);
    text-shadow:0 2px 0 rgba(255,255,255,0.7);
  }

  .tagline{
    color:var(--text-dim);
    letter-spacing:.05em;
    font-size:1rem;
    margin:0;
  }

  .hero-line{
    width:60px; height:2px;
    border-radius:2px;
    background:linear-gradient(to right, transparent, var(--pink), transparent);
    margin-top:40px;
    opacity:.8;
  }

  /* ---------- セクション共通 ---------- */
  section{
    padding:100px 0 40px;
    opacity:0;
    transform:translateY(28px);
    transition:opacity .8s ease, transform .8s ease;
  }
  section.in-view{opacity:1; transform:translateY(0);}

  .section-head{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:36px;
  }
  .section-head .mark{
    width:32px; height:32px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--pink), var(--blue-deep));
    box-shadow:0 0 0 4px rgba(111,179,217,0.14);
    flex-shrink:0;
  }
  .section-head h2{
    font-family:'Kaisei Decol', serif;
    font-size:1.4rem;
    letter-spacing:.08em;
    margin:0;
    font-weight:700;
    color:var(--blue-deep);
  }

  /* ---------- 自己紹介 ---------- */
  .intro p{
    font-size:.98rem;
    margin:0 0 20px;
  }
  .intro p:last-child{margin-bottom:0;}

  .note-card{
    margin-top:26px;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 24px;
    font-size:.92rem;
    color:var(--text-dim);
  }

  /* ---------- リンク一覧 ---------- */
  .linklist{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .linkbtn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    text-decoration:none;
    color:var(--text);
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 22px;
    font-size:.98rem;
    letter-spacing:.04em;
    position:relative;
    overflow:hidden;
    transition:border-color .3s ease, background .3s ease, transform .3s ease;
  }
  .linkbtn::before{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(100deg, transparent, rgba(111,179,217,0.16), transparent);
    transform:translateX(-120%);
    transition:transform .6s ease;
  }
  .linkbtn:hover{
    border-color:var(--pink-deep);
    background:var(--bg-panel-2);
    transform:translateY(-2px);
  }
  .linkbtn:hover::before{transform:translateX(120%);}
  .linkbtn .arrow{color:var(--blue-deep); font-family:'Kaisei Decol', serif;}

  footer{
    text-align:center;
    padding:70px 24px 50px;
    color:var(--text-dim);
    font-size:.78rem;
    letter-spacing:.14em;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>

<script>
  // 雪の結晶生成
  const field = document.getElementById('drift');
  const emojis = ['❄️','🩵','⛄'];
  const count = window.innerWidth < 600 ? 12 : 20;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'drift-item';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const left = Math.random()*100;
    const duration = 9 + Math.random()*10;
    const delay = Math.random()*10;
    const drift = (Math.random()*70 - 35) + 'px';
    p.style.left = left + 'vw';
    p.style.animationDuration = duration + 's';
    p.style.animationDelay = delay + 's';
    p.style.setProperty('--drift', drift);
    field.appendChild(p);
  }

  // スクロールで各セクションを浮かび上がらせる
  const sections = document.querySelectorAll('section');
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('in-view');
        io.unobserve(entry.target);
      }
    });
  }, {threshold:0.15});
  sections.forEach(s=>io.observe(s));
</script>
